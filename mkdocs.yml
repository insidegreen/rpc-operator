site_name: RPC Operator
site_description: Kubernetes operator for Redpanda Connect pipelines
site_url: https://insidegreen.github.io/rpc-operator/
repo_url: https://forgejo.thecloudroute.com/tom/rpc-operator
repo_name: rpc-operator

docs_dir: docs/user
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/images/logo.png
  favicon: assets/images/favicon.ico

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist
  - pymdownx.tilde
  - toc:
      permalink: true
  - tables

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Getting Started:
      - Install the Operator: getting-started/install.md
      - Configure a Cluster: getting-started/configure-cluster.md
      - Deploy Your First Pipeline: getting-started/first-pipeline.md
  - Operating:
      - Deployment: operating/deployment.md
      - Authentication: operating/authentication.md
      - Monitoring: operating/monitoring.md
      - Logging: operating/logging.md
      - Network Policies: operating/network-policies.md
  - Authoring:
      - Pipeline Basics: authoring/basics.md
      - Input Configuration: authoring/input.md
      - Processors: authoring/processors.md
      - Output Configuration: authoring/output.md
      - Error Handling: authoring/error-handling.md
  - Clusters:
      - PipelineCluster Overview: clusters/overview.md
      - Deployment: clusters/deployment.md
      - Scaling: clusters/scaling.md
      - Monitoring: clusters/monitoring.md
  - Operations:
      - Common Tasks: operations/common-tasks.md
      - Troubleshooting: operations/troubleshooting.md
      - Performance Tuning: operations/performance-tuning.md
      - Upgrades: operations/upgrades.md
  - Reference:
      - Pipeline CRD: reference/pipeline-crd.md
      - PipelineCluster CRD: reference/pipelinecluster-crd.md

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/insidegreen/rpc-operator

copyright: Copyright 2026 Inside Green
