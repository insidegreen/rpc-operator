name: Build & Push Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

env:
  IMAGE: forgejo.thecloudroute.com/tom/rpc-operator

jobs:
  build-push:
    name: Kaniko build & push to Forgejo registry (linux/arm64)
    runs-on:
      - docker
      - arm64
    # Alpine runner default container lacks node/bash — use act-compatible image
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          # On pull_request the default ref is the merge commit; use the PR
          # head sha so the image matches what reviewers see in the PR diff
          # and the :pr-<n>-<sha> tag is meaningful.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ref="${GITHUB_REF}"
          dests=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            short_sha="${PR_HEAD_SHA:0:7}"
            dests="${IMAGE}:pr-${PR_NUMBER} ${IMAGE}:pr-${PR_NUMBER}-${short_sha}"
          elif [[ "${ref}" == refs/tags/v* ]]; then
            version="${ref#refs/tags/}"
            dests="${IMAGE}:${version} ${IMAGE}:latest"
          elif [[ "${ref}" == refs/heads/main ]]; then
            short_sha="${GITHUB_SHA:0:7}"
            dests="${IMAGE}:main ${IMAGE}:main-${short_sha}"
          else
            echo "Unexpected ref ${ref}; no tags computed"
            exit 1
          fi
          echo "destinations<<EOF" >> "${GITHUB_OUTPUT}"
          # Whitespace-separated for kaniko-action (newlines also accepted)
          for d in ${dests}; do echo "${d}" >> "${GITHUB_OUTPUT}"; done
          echo "EOF" >> "${GITHUB_OUTPUT}"
          echo "Computed destinations:"
          printf '  %s\n' ${dests}

      - name: Build & push (Kaniko)
        uses: https://codeberg.org/umglurf/kaniko-action@main
        # GODEBUG=http2client=0 forces kaniko's registry client onto HTTP/1.1.
        # Pushing the large `go build` layer over HTTP/2 trips the registry's
        # reverse proxy, which resets the stream mid-upload
        # ("stream ID N; PROTOCOL_ERROR; received from peer"). --push-retry
        # covers any residual transient resets.
        env:
          GODEBUG: http2client=0
        with:
          context: .
          docker_file: Dockerfile
          push: true
          cache: true
          cache_repo: ${{ env.IMAGE }}/cache
          extra_args: --push-retry 5 --image-fs-extract-retry 3
          credentials: |
            forgejo.thecloudroute.com=${{ github.actor }}:${{ secrets.PUSH_PACKAGE_TOKEN }}
          destinations: ${{ steps.tags.outputs.destinations }}
