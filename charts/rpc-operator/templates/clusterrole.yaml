apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rpc-operator.fullname" . }}-manager
  labels:
    {{- include "rpc-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, pods, services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # F48: operator reads Secrets to substitute values into cluster-assigned pipeline streams.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # F47: PipelineCluster controller manages a StatefulSet of streams-mode instances.
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [podmonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [rpc.operator.io]
    resources: [pipelineclusters, pipelines]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [rpc.operator.io]
    resources: [pipelineclusters/finalizers, pipelines/finalizers]
    verbs: [update]
  - apiGroups: [rpc.operator.io]
    resources: [pipelineclusters/status, pipelines/status]
    verbs: [get, patch, update]
