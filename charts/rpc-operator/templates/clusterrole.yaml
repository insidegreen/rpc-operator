apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rpc-operator.fullname" . }}-manager
  labels:
    {{- include "rpc-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, pods]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [monitoring.coreos.com]
    resources: [podmonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [rpc.operator.io]
    resources: [pipelines]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [rpc.operator.io]
    resources: [pipelines/finalizers]
    verbs: [update]
  - apiGroups: [rpc.operator.io]
    resources: [pipelines/status]
    verbs: [get, patch, update]
